name: rev513a release asset verification and mirror

on:
  push:
    paths:
      - '.github/workflows/rev513a_fetch_release_assets.yml'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  verify-and-mirror:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Download authored release assets
        shell: bash
        run: |
          set -euo pipefail
          BASE='https://github.com/jstefanis/ceus-offline-environments/releases/download/rev513a-env-20260712'
          mkdir -p release-assets
          cd release-assets
          assets=(
            ceus_python311_common_offline_rev513a_r1_cdx_cl.zip
            ceus_python311_common_offline_rev513a_r1_cdx_cl.zip.sha256
            ceus_pyqt5_binding_offline_rev513a_r1_cdx_cl.zip
            ceus_pyqt5_binding_offline_rev513a_r1_cdx_cl.zip.sha256
            ceus_pyside6_binding_offline_rev513a_r1_cdx_cl.zip
            ceus_pyside6_binding_offline_rev513a_r1_cdx_cl.zip.sha256
            ceus_system_deps_ubuntu2404_offline_rev513a_r1_cdx_cl.zip
            ceus_system_deps_ubuntu2404_offline_rev513a_r1_cdx_cl.zip.sha256
            SYSTEM_PACKAGE_MANIFEST_rev513a.md
            SYSTEM_DEPENDENCIES_rev513a.md
            RELEASE_MANIFEST_rev513a.md
            SHA256SUM_rev513a.txt
          )
          for asset in "${assets[@]}"; do
            curl --fail --location --retry 4 --retry-all-errors               --output "$asset" "$BASE/$asset"
          done

      - name: Verify declared SHA-256 values
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          cat > expected_sha256.txt <<'EOF'
          ed8ee9b04be23a05a1f9e88f5cf7fd59da45a539ad7a45e23bc37e76ae472c20  ceus_python311_common_offline_rev513a_r1_cdx_cl.zip
          d572ca2074c6f22aac9c9dc292da720b83f38043d7c99caf4f6ebf0f5b9b73c9  ceus_python311_common_offline_rev513a_r1_cdx_cl.zip.sha256
          c670ce21c1020f2e802905bb1222834abd83139d7d0ad244cf439af7ce5a8d29  ceus_pyqt5_binding_offline_rev513a_r1_cdx_cl.zip
          9a1f172092bd36f361a02e94f1d96918014051c215ab4c0acadd66fa498d82b0  ceus_pyqt5_binding_offline_rev513a_r1_cdx_cl.zip.sha256
          b963c3da358a3d8c3df6b9024eeb19db3996a8a78ea27e362d163c9c3def188c  ceus_pyside6_binding_offline_rev513a_r1_cdx_cl.zip
          04a996a5d22c04d05d3cc9fd6666c7b3661f46b883dee5d084f0f6f2001877f9  ceus_pyside6_binding_offline_rev513a_r1_cdx_cl.zip.sha256
          f6e986704c6bbb7a58b98b6d5573e245c400964d89ef1348ffc961b2f50f7aa4  ceus_system_deps_ubuntu2404_offline_rev513a_r1_cdx_cl.zip
          56531153151763792e91baa66468e0fb51b67d889efc00bd82c52ca96881bb3f  ceus_system_deps_ubuntu2404_offline_rev513a_r1_cdx_cl.zip.sha256
          9cca919116a1bfbfdc941545542d58965badf47d84344fd78d99c7120f3eb230  SYSTEM_PACKAGE_MANIFEST_rev513a.md
          9ad14cb0559ab0bbdb1f15444177ec53e2bc143f4e24d88ad504e6d450258f76  SYSTEM_DEPENDENCIES_rev513a.md
          EOF
          sha256sum -c expected_sha256.txt | tee declared_hash_check.txt
          sha256sum -c SHA256SUM_rev513a.txt | tee release_manifest_hash_check.txt

      - name: Verify ZIP integrity
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          for archive in *.zip; do
            unzip -t "$archive" > "${archive}.unzip-test.txt"
          done

      - name: Record inventory
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          find . -maxdepth 1 -type f -printf '%f\t%s bytes\n' | sort > asset_inventory.txt
          sha256sum * > downloaded_all_sha256.txt

      - name: Upload verified release assets
        uses: actions/upload-artifact@v4
        with:
          name: rev513a-verified-release-assets
          path: release-assets/
          if-no-files-found: error
          compression-level: 0
          retention-days: 7
